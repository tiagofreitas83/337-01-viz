<style>
  :root { --gold: #FFCD7D; --bg: rgba(0,0,0,0.55); --br: 8px; }
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky } from 'three/addons/objects/Sky.js';

const app = document.getElementById('app');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const pmremGen = new THREE.PMREMGenerator(renderer);
pmremGen.compileEquirectangularShader();
const ENV_INTENSITY = 1.0;

// ============ SKY procedural (Rayleigh + Mie) ============
const sky = new Sky();
sky.scale.setScalar(450000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU.turbidity.value = 8;
skyU.rayleigh.value = 2;
skyU.mieCoefficient.value = 0.005;
skyU.mieDirectionalG.value = 0.8;

// Sky duplicado em scene auxiliar pra gerar envMap PBR dinâmico
const envSky = new Sky();
const envScene = new THREE.Scene();
envScene.add(envSky);
let envRT = null;
function refreshEnvironment() {
  const a = skyU, b = envSky.material.uniforms;
  b.turbidity.value = a.turbidity.value;
  b.rayleigh.value = a.rayleigh.value;
  b.mieCoefficient.value = a.mieCoefficient.value;
  b.mieDirectionalG.value = a.mieDirectionalG.value;
  b.sunPosition.value.copy(a.sunPosition.value);
  if (envRT) envRT.dispose();
  envRT = pmremGen.fromScene(envScene, 0.04);
  scene.environment = envRT.texture;
}

// ============ Estrelas (3500 pontos no hemisfério superior) ============
const stars = (() => {
  const N = 3500;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    let x, y, z, l;
    do {
      x = Math.random() * 2 - 1;
      y = Math.random();           // hemisfério superior
      z = Math.random() * 2 - 1;
      l = Math.sqrt(x*x + y*y + z*z);
    } while (l > 1 || l < 0.05);
    const r = 200000;
    pos[i*3]   = r * x / l;
    pos[i*3+1] = r * y / l;
    pos[i*3+2] = r * z / l;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 180,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(geom, mat);
})();
scene.add(stars);

const camera = new THREE.PerspectiveCamera(50, W()/H(), 0.01, 100000);
camera.position.set(20, 15, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = true;

const hemi = new THREE.HemisphereLight(0xa8d0e8, 0x6a5a44, 1.0);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(50, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.02;
scene.add(sun);
scene.add(sun.target);
const fillBack = new THREE.DirectionalLight(0xc8d4e0, 0.45);
fillBack.position.set(-40, 50, -25);
scene.add(fillBack);
const fillSide = new THREE.DirectionalLight(0xfff0d8, 0.35);
fillSide.position.set(-60, 20, 40);
scene.add(fillSide);
const ambient = new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambient);
const FILL_BACK_BASE = 0.45;
const FILL_SIDE_BASE = 0.35;

// ============ SOL: posição real (NOAA approx) ============
const SITE_LAT = -29.3771;   // Canela/RS
const SITE_LON = -50.8378;
const TZ_HOURS = -3;         // BRT (UTC-3)
const MONTH_NAMES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
let northOffsetDeg = -149;   // varanda em -Z apontando pra az 31° NE (= +Z girado 180° + 31°)
const sunState = { month: 6, day: 15, hourLocal: 12 };
let shadowGround = null;

// retorna {altitude, azimuth} em radianos. azimuth: 0=Norte, π/2=Leste (sentido horário visto de cima)
function solarPosition(year, month, day, hourUTC) {
  const date = new Date(Date.UTC(year, month - 1, day));
  const start = new Date(Date.UTC(year, 0, 1));
  const N = Math.floor((date - start) / 86400000) + 1;
  const γ = (2 * Math.PI / 365) * (N - 1 + (hourUTC - 12) / 24);
  const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(γ) - 0.032077 * Math.sin(γ)
                  - 0.014615 * Math.cos(2*γ) - 0.040849 * Math.sin(2*γ));
  const decl = 0.006918 - 0.399912 * Math.cos(γ) + 0.070257 * Math.sin(γ)
              - 0.006758 * Math.cos(2*γ) + 0.000907 * Math.sin(2*γ)
              - 0.002697 * Math.cos(3*γ) + 0.00148 * Math.sin(3*γ);
  const time_offset = eqtime + 4 * SITE_LON;
  const tst = hourUTC * 60 + time_offset;
  const ha = (tst / 4 - 180) * Math.PI / 180;
  const latR = SITE_LAT * Math.PI / 180;
  let cosZ = Math.sin(latR) * Math.sin(decl) + Math.cos(latR) * Math.cos(decl) * Math.cos(ha);
  cosZ = Math.max(-1, Math.min(1, cosZ));
  const zenith = Math.acos(cosZ);
  const altitude = Math.PI / 2 - zenith;
  let cosAz = (Math.sin(decl) - Math.sin(latR) * Math.cos(zenith)) / (Math.cos(latR) * Math.sin(zenith) || 1e-9);
  cosAz = Math.max(-1, Math.min(1, cosAz));
  let azimuth = Math.acos(cosAz);
  if (ha > 0) azimuth = 2 * Math.PI - azimuth;
  return { altitude, azimuth };
}

// converte (altitude, azimuth astronômico) para vetor unitário no espaço do modelo
function sunDirection(altitude, azimuth) {
  const nRad = northOffsetDeg * Math.PI / 180;
  const nx = Math.sin(nRad), nz = Math.cos(nRad);   // norte verdadeiro no modelo
  const ex = -nz, ez = nx;                           // leste = norte girado -90° (horário, visto de cima)
  const horiz = Math.cos(altitude);
  const vert = Math.sin(altitude);
  const dx = horiz * (Math.cos(azimuth) * nx + Math.sin(azimuth) * ex);
  const dz = horiz * (Math.cos(azimuth) * nz + Math.sin(azimuth) * ez);
  return new THREE.Vector3(dx, vert, dz);
}

function getSunCenter() {
  if (!bbox) return { center: new THREE.Vector3(), R: 50 };
  const c = bbox.getCenter(new THREE.Vector3());
  const sz = bbox.getSize(new THREE.Vector3());
  c.y = bbox.min.y;
  const R = Math.max(sz.x, sz.z) * 1.6;
  return { center: c, R };
}


function setupShadowsForModel() {
  if (!bbox || !model) return;
  // meshes: cast + receive
  model.traverse((o) => {
    if (o.isMesh) {
      o.castShadow = true;
      o.receiveShadow = true;
    }
  });
  // plano de chão grande sob o modelo, recebe sombra translúcida
  const sz = bbox.getSize(new THREE.Vector3());
  const c  = bbox.getCenter(new THREE.Vector3());
  const R  = Math.max(sz.x, sz.z);
  if (shadowGround) {
    scene.remove(shadowGround);
    shadowGround.geometry.dispose();
    shadowGround.material.dispose();
  }
  const planeGeom = new THREE.PlaneGeometry(R * 8, R * 8);
  const planeMat  = new THREE.ShadowMaterial({ opacity: 0.45 });
  shadowGround = new THREE.Mesh(planeGeom, planeMat);
  shadowGround.rotation.x = -Math.PI / 2;
  shadowGround.position.set(c.x, bbox.min.y - 0.01, c.z);
  shadowGround.receiveShadow = true;
  scene.add(shadowGround);
  // shadow camera (ortho) cobrindo o modelo
  const d = Math.max(sz.x, sz.z) * 0.8;
  sun.shadow.camera.left   = -d;
  sun.shadow.camera.right  =  d;
  sun.shadow.camera.top    =  d;
  sun.shadow.camera.bottom = -d;
  sun.shadow.camera.near   = 0.1;
  sun.shadow.camera.far    = R * 8;
  sun.shadow.camera.updateProjectionMatrix();
}

// cor + intensidades em função da altitude solar (graus)
function skyState(altDeg) {
  const C = (h) => new THREE.Color(h);
  const mix = (a, b, t) => a.clone().lerp(b, t);
  // paletas-chave
  const DAY     = { bg: C(0x9cc8e8), sky: C(0xa8d0e8), gnd: C(0x6a5a44), amb: 0.30, sun: C(0xfff5e0), sunI: 1.9, fill: 1.0, exp: 1.10 };
  const GOLDEN  = { bg: C(0xe8723a), sky: C(0xff8c50), gnd: C(0x4a2818), amb: 0.18, sun: C(0xff6a25), sunI: 1.2, fill: 0.55, exp: 1.20 };
  const DUSK    = { bg: C(0x3a2748), sky: C(0x4a3860), gnd: C(0x140a1c), amb: 0.10, sun: C(0xff4030), sunI: 0.18, fill: 0.30, exp: 1.05 };
  const TWIL    = { bg: C(0x101830), sky: C(0x182040), gnd: C(0x06080e), amb: 0.05, sun: C(0x000000), sunI: 0,    fill: 0.12, exp: 0.85 };
  const NIGHT   = { bg: C(0x04060f), sky: C(0x0a1024), gnd: C(0x020306), amb: 0.025,sun: C(0x000000), sunI: 0,    fill: 0.06, exp: 0.70 };

  function lerpState(a, b, t) {
    t = Math.max(0, Math.min(1, t));
    return {
      bg:   mix(a.bg,   b.bg,   t),
      sky:  mix(a.sky,  b.sky,  t),
      gnd:  mix(a.gnd,  b.gnd,  t),
      sun:  mix(a.sun,  b.sun,  t),
      amb:  a.amb  + (b.amb  - a.amb)  * t,
      sunI: a.sunI + (b.sunI - a.sunI) * t,
      fill: a.fill + (b.fill - a.fill) * t,
      exp:  a.exp  + (b.exp  - a.exp)  * t,
    };
  }
  if (altDeg >= 30)  return DAY;
  if (altDeg >= 6)   return lerpState(GOLDEN, DAY,    (altDeg - 6) / 24);   // 6..30° → golden→dia
  if (altDeg >= 0)   return lerpState(DUSK,   GOLDEN, altDeg / 6);          // 0..6°  → dusk→golden
  if (altDeg >= -6)  return lerpState(TWIL,   DUSK,   (altDeg + 6) / 6);    // -6..0° → twil→dusk (crepúsculo civil)
  if (altDeg >= -18) return lerpState(NIGHT,  TWIL,   (altDeg + 18) / 12);  // -18..-6 → night→twil (crepúsculo náutico/astro)
  return NIGHT;
}

function updateSun() {
  if (!bbox) return;
  const hourUTC = sunState.hourLocal - TZ_HOURS;
  const { altitude, azimuth } = solarPosition(2026, sunState.month, sunState.day, hourUTC);
  const altDeg = altitude * 180 / Math.PI;
  const { center, R } = getSunCenter();
  const dir = sunDirection(altitude, azimuth);

  // Sky shader: sunPosition é direção unitária do observador → sol
  skyU.sunPosition.value.copy(dir);
  // Rayleigh aumenta no horizonte (céu mais vermelho/laranja); turbidity também
  if (altDeg >= 10)       { skyU.rayleigh.value = 1.5; skyU.turbidity.value = 6; skyU.mieCoefficient.value = 0.005; }
  else if (altDeg >= 0)   { skyU.rayleigh.value = 1.5 + (10 - altDeg) * 0.20; skyU.turbidity.value = 6 + (10 - altDeg) * 0.5; skyU.mieCoefficient.value = 0.005 + (10 - altDeg) * 0.0008; }
  else if (altDeg >= -8)  { skyU.rayleigh.value = 3.5 + (-altDeg) * 0.05; skyU.turbidity.value = 11 + (-altDeg) * 0.5; skyU.mieCoefficient.value = 0.011 + (-altDeg) * 0.0004; }
  else                    { skyU.rayleigh.value = 0.5; skyU.turbidity.value = 1; skyU.mieCoefficient.value = 0.001; }

  // céu (background do Sky shader já desenha o céu inteiro — não setamos scene.background)
  scene.background = null;

  // luzes
  const s = skyState(altDeg);
  hemi.color.copy(s.sky);
  hemi.groundColor.copy(s.gnd);
  ambient.intensity = s.amb;
  sun.color.copy(s.sun);
  sun.intensity = s.sunI;
  fillBack.intensity = FILL_BACK_BASE * s.fill;
  fillSide.intensity = FILL_SIDE_BASE * s.fill;
  renderer.toneMappingExposure = s.exp;

  // posiciona luz direcional (sol no infinito visto do centro)
  const sunPos = center.clone().add(dir.clone().multiplyScalar(R));
  sun.target.position.copy(center);
  sun.target.updateMatrixWorld();
  sun.position.copy(sunPos);

  // estrelas: ganham opacidade durante o crepúsculo náutico/astro até a noite
  if (altDeg < -6) {
    stars.material.opacity = Math.min(1, (-altDeg - 6) / 12);
  } else {
    stars.material.opacity = 0;
  }
  stars.visible = stars.material.opacity > 0.01;

  // environment PBR dinâmico (reflexões nos materiais seguem o céu real)
  refreshEnvironment();
}

function refreshSunVisuals() {
  updateSun();
}

// listeners

// --- helpers de cor + ruído ---
function hex(c) { return parseInt(c.slice(1), 16); }
function rgb(c) { const n = hex(c); return [(n>>16)&255,(n>>8)&255,n&255]; }
function mix(a, b, t) { const A=rgb(a), B=rgb(b); return `rgb(${A[0]+(B[0]-A[0])*t|0},${A[1]+(B[1]-A[1])*t|0},${A[2]+(B[2]-A[2])*t|0})`; }

function makeWoodTex(cfg) {
  const S = 1024;
  const c = document.createElement('canvas'); c.width = c.height = S;
  const ctx = c.getContext('2d');
  ctx.fillStyle = cfg.base; ctx.fillRect(0,0,S,S);
  const vertical = cfg.orient !== 'h';
  // veios grossos
  const veins = 60;
  for (let i = 0; i < veins; i++) {
    const pos = Math.random() * S;
    const w = 0.5 + Math.random() * 3;
    const t = 0.15 + Math.random() * 0.55;
    ctx.fillStyle = mix(cfg.base, cfg.dark, t);
    ctx.globalAlpha = 0.5 + Math.random() * 0.4;
    if (vertical) ctx.fillRect(pos, 0, w, S); else ctx.fillRect(0, pos, S, w);
  }
  ctx.globalAlpha = 1;
  // nós
  const knots = 4 + Math.random() * 5 | 0;
  for (let i = 0; i < knots; i++) {
    const x = Math.random()*S, y = Math.random()*S;
    const r = 8 + Math.random()*22;
    const grad = ctx.createRadialGradient(x,y,1, x,y,r);
    grad.addColorStop(0, mix(cfg.base, cfg.dark, 0.85));
    grad.addColorStop(0.6, mix(cfg.base, cfg.dark, 0.35));
    grad.addColorStop(1, cfg.base);
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  // ripado: linhas escuras separando réguas
  if (cfg.ribs) {
    const ribs = 24;
    ctx.fillStyle = '#000';
    for (let i = 1; i < ribs; i++) {
      const pos = i * (S / ribs);
      ctx.globalAlpha = 0.55;
      if (vertical) ctx.fillRect(pos-1, 0, 2, S); else ctx.fillRect(0, pos-1, S, 2);
    }
    ctx.globalAlpha = 1;
  }
  // ruído fino
  const id = ctx.getImageData(0,0,S,S);
  for (let i = 0; i < id.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 18;
    id.data[i]+=n; id.data[i+1]+=n; id.data[i+2]+=n;
  }
  ctx.putImageData(id, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function makeStoneTex(cfg) {
  const S = 1024;
  const c = document.createElement('canvas'); c.width = c.height = S;
  const ctx = c.getContext('2d');
  ctx.fillStyle = cfg.base; ctx.fillRect(0,0,S,S);
  // manchas (estilo Voronoi pobre)
  const blobs = cfg.blob || 90;
  for (let i = 0; i < blobs; i++) {
    const x = Math.random()*S, y = Math.random()*S;
    const r = 30 + Math.random() * 120;
    const t = Math.random();
    const target = t < 0.5 ? cfg.mid : cfg.dark;
    const grad = ctx.createRadialGradient(x,y,1, x,y,r);
    grad.addColorStop(0, target);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.15 + Math.random() * 0.35;
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // veio horizontal pro travertino
  if (cfg.orient === 'h') {
    for (let i = 0; i < 35; i++) {
      const y = Math.random() * S;
      ctx.strokeStyle = mix(cfg.base, cfg.dark, 0.4);
      ctx.globalAlpha = 0.2 + Math.random() * 0.25;
      ctx.lineWidth = 0.5 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x <= S; x += 20) ctx.lineTo(x, y + (Math.random()-0.5)*8);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  // ruído fino
  const id = ctx.getImageData(0,0,S,S);
  for (let i = 0; i < id.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 22;
    id.data[i]+=n; id.data[i+1]+=n; id.data[i+2]+=n;
  }
  ctx.putImageData(id, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

const matCache = {};
function buildMaterial(id) {
  if (matCache[id]) return matCache[id];
  const cfg = MATERIALS[id];
  const m = new THREE.MeshStandardMaterial({
    color: 0xffffff, roughness: cfg.rough, metalness: 0,
    envMapIntensity: ENV_INTENSITY,
  });
  const tex = cfg.kind === 'wood' ? makeWoodTex(cfg) : makeStoneTex(cfg);
  tex.repeat.set(cfg.repeat, cfg.repeat);
  m.map = tex;
  m.name = 'cfg_' + id;
  matCache[id] = m;
  return m;
}

// adições persistentes via picker (localStorage)
const CUSTOM_KEY = '337-01-custom-materials';
const customAdds = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{"floor":[],"blackwall":[],"lightwood":[],"roofblack":[]}');

function classifyMaterialName(name) {
  const raw = name || '';
  const N = raw.toUpperCase().trim();
  if (!N) return null;
  // custom user adds têm prioridade
  for (const [key, list] of Object.entries(customAdds)) {
    if (key !== 'roofblack' && list.includes(raw)) return key;
  }
  // PISO — ordem importa, mais específico primeiro
  if (N.includes('PEDRA DONATA')) return 'floor'; // piso real área social (BOSSA1)
  if (N.includes('VIDRO - CRISTAL')) return 'floor';
  if (N.includes('GRANITO')) return 'floor';
  if (N.includes('PORCELANATO')) return 'floor';
  if (N.includes('CERÂMICA') || N.includes('CERAMICA')) return 'floor';
  if (N.includes('CONTRAPISO')) return 'floor';
  if (N.startsWith('PEDRA - ')) return 'floor';
  if (raw === '<auto>5') return 'floor';
  // PAREDE PRETA
  if (N.includes('CONCRETO APARENTE PRETO')) return 'blackwall';
  // MADEIRA CLARA
  if (N.includes('TAUARI')) return 'lightwood';
  if (N.includes('CARVALHO CLARO')) return 'lightwood';
  return null;
}

const ROOF_BLACK_DEFAULT = ['TELHA METÁLICA', 'PINTURA - CINZA ESCURO'];
function isRoofBlack(name) {
  return ROOF_BLACK_DEFAULT.includes(name) || customAdds.roofblack.includes(name);
}

function applyFinish(groupKey, optionId) {
  // ========== FLASH VERMELHO antes do swap real ==========
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xff0040, transparent: false, opacity: 1, side: THREE.DoubleSide });
  const originals = [];
  meshGroups[groupKey].forEach(({ mesh, slot }) => {
    if (Array.isArray(mesh.material)) {
      originals.push({ mesh, slot, mat: mesh.material[slot] });
      mesh.material[slot] = flashMat;
    } else {
      originals.push({ mesh, slot: -1, mat: mesh.material });
      mesh.material = flashMat;
    }
  });
  console.log(`[FLASH] ${groupKey}: ${originals.length} meshes vermelhos por 250ms`);

  setTimeout(() => {
    // aplica material real
    const newMat = buildMaterial(optionId);
    newMat.transparent = false;
    newMat.opacity = 1;
    newMat.depthWrite = true;
    newMat.side = THREE.FrontSide;
    originals.forEach(({ mesh, slot }) => {
      if (slot >= 0) mesh.material[slot] = newMat;
      else mesh.material = newMat;
    });
    GROUPS[groupKey].current = optionId;
  }, 250);
}

const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);
const bar = document.getElementById('bar-inner');
const msg = document.getElementById('msg');
const sub = document.getElementById('sub');

const GLB_URL = '337-01_Estudo_04_opt.glb';

loader.load(
  GLB_URL,
  (gltf) => {
    model = gltf.scene;
    scene.add(model);

    bbox = new THREE.Box3().setFromObject(model);
    fitView('iso');
    setupShadowsForModel();
    refreshSunVisuals();

    document.getElementById('loading').style.display = 'none';
    // painel aberto por default em desktop, fechado em mobile
    if (window.matchMedia('(min-width: 769px)').matches) {
      document.getElementById('panel').classList.add('open');
    }

    // contagens + boost de envMapIntensity + classificação dos meshes em grupos
    let meshes = 0, tris = 0;
    model.traverse((o) => {
      if (o.isMesh) {
        meshes++;
        const g = o.geometry;
        if (g && g.index) tris += g.index.count / 3;
        else if (g && g.attributes.position) tris += g.attributes.position.count / 3;
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach((m, idx) => {
          if (!m) return;
          if ('envMapIntensity' in m) m.envMapIntensity = ENV_INTENSITY;
          // override: cobertura/telhado branco -> preto fosco
          if (isRoofBlack(m.name)) {
            m.color = new THREE.Color(0x101012);
            m.roughness = 0.65;
            m.metalness = 0.15;
            if (m.map) m.map = null;
          }
          m.needsUpdate = true;
          const groupKey = classifyMaterialName(m.name);
          if (groupKey) {
            meshGroups[groupKey].push({ mesh: o, slot: idx });
          }
        });
      }
    });
    // ===== AUTO-DETECÇÃO DE PISO POR GEOMETRIA =====
    // pega todo mesh cuja bounding box é "fina em Y" (laje horizontal)
    // e tem área XZ razoável e não está muito alto
    const sceneBbox = new THREE.Box3().setFromObject(model);
    const sceneMinY = sceneBbox.min.y;
    const sceneH = sceneBbox.max.y - sceneMinY;
    let geomFloorCount = 0;
    model.traverse((o) => {
      if (!o.isMesh) return;
      const bb = new THREE.Box3().setFromObject(o);
      const sz = bb.getSize(new THREE.Vector3());
      const maxXZ = Math.max(sz.x, sz.z);
      const ratioY = sz.y / Math.max(maxXZ, 0.001);
      const relH = (bb.min.y - sceneMinY) / Math.max(sceneH, 0.001);
      // laje fina (Y/XZ < 0.06) E grande (>2 unidades) E na metade inferior da cena
      if (ratioY < 0.06 && maxXZ > 2 && relH < 0.6) {
        // evitar duplicar se já está em algum grupo
        const already = meshGroups.floor.some(g => g.mesh === o)
                     || meshGroups.blackwall.some(g => g.mesh === o)
                     || meshGroups.lightwood.some(g => g.mesh === o);
        if (!already) {
          meshGroups.floor.push({ mesh: o, slot: Array.isArray(o.material) ? 0 : -1 });
          geomFloorCount++;
        }
      }
    });
    console.log(`[auto-floor] detectados por geometria: +${geomFloorCount} meshes`);

    // monta UI de acabamentos (só os swatches, sem listas verbose)
    const finishesDiv = document.getElementById('finishes');
    for (const [key, grp] of Object.entries(GROUPS)) {
      const wrap = document.createElement('div');
      wrap.className = 'group';
      wrap.innerHTML = `<h4>${grp.label}</h4>`;
      const sw = document.createElement('div'); sw.className = 'swatches';
      grp.options.forEach(opt => {
        const cfg = MATERIALS[opt.id];
        const el = document.createElement('div');
        el.className = 'swatch' + (opt.id === grp.current ? ' on' : '');
        el.innerHTML = `<div class="chip" style="background:${cfg.swatch}"></div><span title="${opt.label}">${opt.label}</span>`;
        el.addEventListener('click', () => {
          applyFinish(key, opt.id);
          sw.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
          el.classList.add('on');
        });
        sw.appendChild(el);
      });
      wrap.appendChild(sw);
      finishesDiv.appendChild(wrap);
    }

    // top-level nodes
    const nodesDiv = document.getElementById('nodes');
    const list = model.children.length === 1 && model.children[0].children.length > 1
      ? model.children[0].children
      : model.children;
    list.forEach((node, i) => {
      const id = `n-${i}`;
      const div = document.createElement('div');
      div.className = 'row';
      const name = (node.name || `Nó ${i}`).replace(/_/g, ' ');
      div.innerHTML = `<input type="checkbox" id="${id}" checked><label for="${id}" title="${node.name}">${name}</label>`;
      nodesDiv.appendChild(div);
      div.querySelector('input').addEventListener('change', (e) => {
        node.visible = e.target.checked;
      });
    });
  },
  (xhr) => {
    if (xhr.total) {
      const pct = (xhr.loaded / xhr.total) * 100;
      bar.style.width = pct.toFixed(1) + '%';
      msg.textContent = `Carregando… ${(xhr.loaded/1e6).toFixed(0)} MB / ${(xhr.total/1e6).toFixed(0)} MB`;
      sub.textContent = `${pct.toFixed(1)}%`;
    } else {
      msg.textContent = `Carregando… ${(xhr.loaded/1e6).toFixed(0)} MB`;
    }
  },
  (err) => {
    msg.textContent = 'Erro ao carregar GLB';
    sub.textContent = err.message || String(err);
    console.error(err);
  }
);

function fitView(mode = 'iso') {
  if (!bbox) return;
  const size = bbox.getSize(new THREE.Vector3());
  const center = bbox.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const d = maxDim * 1.1;
  controls.target.copy(center);
  if (mode === 'top')   camera.position.set(center.x, center.y + d*1.5, center.z + 0.001);
  else if (mode === 'front') camera.position.set(center.x, center.y + size.y*0.3, center.z + d*1.4);
  else                  camera.position.set(center.x + d*0.9, center.y + d*0.65, center.z + d*0.9);
  camera.near = maxDim / 1000;
  camera.far = Math.max(maxDim * 100, 2000000);  // Sky em 450k → far precisa ser maior
  camera.updateProjectionMatrix();
  controls.update();
}

document.getElementById('fit').addEventListener('click',   () => fitView('iso'));

document.getElementById('wire').addEventListener('click', (e) => {

    if (o.isMesh) {
      if (Array.isArray(o.material)) o.material.forEach(m => m.wireframe = wireOn);
      else o.material.wireframe = wireOn;
    }
  });
});

renderer.domElement.addEventListener('click', (e) => {
  if (!pickOn || !model) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(model, true);
  if (!hits.length) return;
  const hit = hits[0];
  let matName = '?';
  if (hit.object.material) {
    const m = Array.isArray(hit.object.material)
      ? hit.object.material[hit.face?.materialIndex || 0]
      : hit.object.material;
    matName = m?.name || '(sem nome)';
  }
  lastPickedName = matName;
  pname.textContent = matName;
  pickerbar.classList.add('on');
  console.log('[pick]', matName, hit.object.name, hit.point);
});

// Paint debug: pintar TODOS meshes com o material clicado de vermelho
const paintBackup = []; // {mesh, slot, mat}
const paintRedMat = new THREE.MeshBasicMaterial({ color: 0xff0040, side: THREE.DoubleSide });
document.getElementById('paintall').addEventListener('click', () => {
  if (!lastPickedName || !model) return;
  // restore previous paint first
  paintBackup.forEach(({mesh, slot, mat}) => {
    if (slot >= 0) mesh.material[slot] = mat; else mesh.material = mat;
  });
  paintBackup.length = 0;
  let n = 0;
  model.traverse((o) => {
    if (!o.isMesh) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach((m, idx) => {
      if (m && m.name === lastPickedName) {
        if (Array.isArray(o.material)) {
          paintBackup.push({mesh: o, slot: idx, mat: o.material[idx]});
          o.material[idx] = paintRedMat;
        } else {
          paintBackup.push({mesh: o, slot: -1, mat: o.material});
          o.material = paintRedMat;
        }
        n++;
      }
    });
  });
  pname.textContent = `🔴 ${n} meshes pintados como "${lastPickedName}"`;
  console.log(`[paintall] ${lastPickedName}: ${n} meshes`);
});
document.getElementById('paintreset').addEventListener('click', () => {
  paintBackup.forEach(({mesh, slot, mat}) => {
    if (slot >= 0) mesh.material[slot] = mat; else mesh.material = mat;
  });
  pname.textContent = `↩ ${paintBackup.length} meshes restaurados`;
  paintBackup.length = 0;
});

pickerbar.querySelectorAll('button[data-add]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!lastPickedName) return;
    const grp = btn.dataset.add;
    if (!customAdds[grp].includes(lastPickedName)) {
      customAdds[grp].push(lastPickedName);
      localStorage.setItem(CUSTOM_KEY, JSON.stringify(customAdds));
    }
    pname.textContent = `✓ "${lastPickedName}" adicionado a ${grp}. Recarregando…`;
    setTimeout(() => location.reload(), 600);
  });
});

(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
